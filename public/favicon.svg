<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF2D2D"/>
      <stop offset="100%" stop-color="#FFD000"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="#FFF9EC"/>

  <!-- Outer frame -->
  <rect x="28" y="28" width="200" height="200" rx="36" fill="url(#bg)"/>

  <!-- Inner scanner frame -->
  <rect x="52" y="52" width="152" height="152" rx="24" fill="#FFF9EC" stroke="#111111" stroke-width="8"/>

  <!-- OCR lines -->
  <rect x="78" y="86" width="100" height="10" rx="5" fill="#111111" opacity="0.85"/>
  <rect x="78" y="112" width="72" height="10" rx="5" fill="#111111" opacity="0.75"/>
  <rect x="78" y="138" width="92" height="10" rx="5" fill="#111111" opacity="0.7"/>

  <!-- Flash bolt -->
  <path d="M148 56L96 138H126L108 200L170 112H136L148 56Z"
        fill="#FFD000"
        stroke="#111111"
        stroke-width="8"
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Corner scan accents -->
  <path d="M52 88V64H76" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
  <path d="M180 64H204V88" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
  <path d="M52 168V192H76" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
  <path d="M180 192H204V168" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
</svg>